version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # @types/react y @types/react-dom deben actualizarse juntos
      react-types:
        patterns:
          - "@types/react*"
      # typescript y sus tipos relacionados
      typescript:
        patterns:
          - "typescript"
          - "@typescript-eslint/*"
    ignore:
      # Major version bumps de Next.js/React se evalúan manualmente
      - dependency-name: next
        update-types: ["version-update:semver-major"]
      - dependency-name: react
        update-types: ["version-update:semver-major"]
      - dependency-name: react-dom
        update-types: ["version-update:semver-major"]
